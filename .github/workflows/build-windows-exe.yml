name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/VolumeGuard/**'
      - '.github/workflows/build-windows-exe.yml'

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (single file, self-contained)
        run: >
          dotnet publish "src/VolumeGuard/VolumeGuard.csproj"
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:DebugType=None
          /p:DebugSymbols=false
          -o "./artifacts/publish"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeGuard-win-x64-singlefile
          path: artifacts/publish/VolumeGuard.exe
